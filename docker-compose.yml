services:
    app:
        image: caster-api
        container_name: caster-api
        build: .
        command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/index.js"
        env_file:
            .env
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DATABASE_URL: ${DATABASE_URL}
            REDIS_URL: redis://redis:6379
        ports:
            - "3000:3000"
    db:
        image: postgres:16
        container_name: caster-db
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - db_data:/var/lib/postgresql/data
    redis:
        image: redis:alpine
        container_name: caster-cache
        ports:
            - "6379:6379"
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5
    adminer:
        image: adminer:latest
        ports:
            - "8080:8080"
        depends_on:
            db:
                condition: service_healthy
volumes:
    db_data: